<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Plotnest Africa Realty Ltd</title>
  <meta name="description" content="Manage your property listings with Plotnest Africa Realty.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-stone-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="./index.html" class="flex items-center gap-3 shrink-0">
          <img src="./public/logos/logo-primary.png" alt="Plotnest Africa Realty" class="h-12 md:h-14 w-auto">
        </a>
        <nav class="hidden md:flex items-center gap-8">
          <a href="./index.html" data-nav class="text-stone-600 hover:text-green-700 transition">Home</a>
          <a href="./listings.html" data-nav class="text-stone-600 hover:text-green-700 transition">Listings</a>
          <a href="./dashboard.html" data-nav class="text-green-700 font-semibold">Dashboard</a>
          <button id="logout-btn" class="inline-flex items-center gap-2 text-red-600 hover:text-red-700 font-medium">
            <i data-lucide="log-out" class="w-4 h-4"></i> Logout
          </button>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2 text-stone-700" aria-label="Open menu">
          <i data-lucide="menu" class="w-7 h-7"></i>
        </button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden hidden-menu md:hidden border-t border-stone-100 bg-white">
      <div class="flex flex-col gap-4 px-4 py-6">
        <a href="./index.html" data-nav class="text-stone-700 hover:text-green-700 font-medium">Home</a>
        <a href="./listings.html" data-nav class="text-stone-700 hover:text-green-700 font-medium">Listings</a>
        <a href="./dashboard.html" data-nav class="text-green-700 font-semibold">Dashboard</a>
        <button id="mobile-logout-btn" class="inline-flex items-center gap-2 text-red-600 font-medium">
          <i data-lucide="log-out" class="w-4 h-4"></i> Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Dashboard Content -->
  <section class="py-8 px-4">
    <div class="max-w-7xl mx-auto">
      <!-- Dashboard Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="text-3xl font-bold text-stone-900 mb-2">Property Management Dashboard</h1>
          <p class="text-stone-600">Manage your property listings</p>
        </div>
        <button id="add-listing-btn" class="inline-flex items-center gap-2 bg-green-700 hover:bg-green-800 text-white font-semibold py-3 px-6 rounded-xl transition">
          <i data-lucide="plus" class="w-5 h-5"></i>
          Add New Listing
        </button>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-100">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
              <i data-lucide="home" class="w-6 h-6 text-green-700"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-stone-900" id="total-listings">0</p>
              <p class="text-sm text-stone-600">Total Listings</p>
            </div>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-100">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
              <i data-lucide="check-circle" class="w-6 h-6 text-blue-700"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-stone-900" id="active-listings">0</p>
              <p class="text-sm text-stone-600">Active</p>
            </div>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-100">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
              <i data-lucide="clock" class="w-6 h-6 text-orange-700"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-stone-900" id="pending-listings">0</p>
              <p class="text-sm text-stone-600">Pending</p>
            </div>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-100">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
              <i data-lucide="x-circle" class="w-6 h-6 text-red-700"></i>
            </div>
            <div>
              <p class="text-2xl font-bold text-stone-900" id="sold-listings">0</p>
              <p class="text-sm text-stone-600">Sold</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Listings Table -->
      <div class="bg-white rounded-xl shadow-sm border border-stone-100 overflow-hidden">
        <div class="p-6 border-b border-stone-100">
          <h2 class="text-xl font-semibold text-stone-900">All Listings</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-stone-50">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Property</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Location</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Type</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Price</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Status</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-stone-700">Actions</th>
              </tr>
            </thead>
            <tbody id="listings-table-body" class="divide-y divide-stone-100">
              <!-- Listings will be populated here -->
            </tbody>
          </table>
        </div>
        <div id="no-listings" class="hidden p-12 text-center">
          <i data-lucide="home" class="w-16 h-16 text-stone-300 mx-auto mb-4"></i>
          <p class="text-stone-600 mb-4">No listings found</p>
          <button id="add-first-listing-btn" class="inline-flex items-center gap-2 bg-green-700 hover:bg-green-800 text-white font-semibold py-2 px-4 rounded-lg transition">
            <i data-lucide="plus" class="w-4 h-4"></i>
            Add Your First Listing
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Add/Edit Listing Modal -->
  <div id="listing-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 bg-black/50 transition-opacity" id="modal-backdrop"></div>
      <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl w-full">
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-semibold text-stone-900" id="modal-title">Add New Listing</h3>
            <button id="close-modal" class="text-stone-400 hover:text-stone-600">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
          <form id="listing-form" class="space-y-6">
            <input type="hidden" id="listing-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Property Title *</label>
                <input type="text" id="title" required class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Location *</label>
                <input type="text" id="location" required class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">County *</label>
                <select id="county" required class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
                  <option value="">Select county</option>
                  <option value="Nairobi">Nairobi</option>
                  <option value="Kiambu">Kiambu</option>
                  <option value="Machakos">Machakos</option>
                  <option value="Laikipia">Laikipia</option>
                  <option value="Nakuru">Nakuru</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Property Type *</label>
                <select id="type" required class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
                  <option value="">Select type</option>
                  <option value="Land">Land</option>
                  <option value="Residential">Residential</option>
                  <option value="Apartment">Apartment</option>
                  <option value="Commercial Land">Commercial Land</option>
                  <option value="Land/Farm">Land/Farm</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Price (KES) *</label>
                <input type="number" id="price" required min="0" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Size</label>
                <input type="text" id="size" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600" placeholder="e.g., 0.25 acres, 45 m²">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Bedrooms</label>
                <input type="number" id="bedrooms" min="0" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Bathrooms</label>
                <input type="number" id="bathrooms" min="0" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Status *</label>
                <select id="status" required class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600">
                  <option value="For Sale">For Sale</option>
                  <option value="Pending">Pending</option>
                  <option value="Sold">Sold</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Image URL</label>
                <input type="url" id="image" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600" placeholder="https://example.com/image.jpg">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-2">Description *</label>
              <textarea id="description" required rows="4" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-2">Features (comma separated)</label>
              <input type="text" id="features" class="w-full border border-stone-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-600 focus:border-green-600" placeholder="e.g., Ready title deed, Water on site, Tarmac road">
            </div>
            <div class="flex gap-4 pt-4">
              <button type="button" id="cancel-btn" class="flex-1 bg-stone-200 hover:bg-stone-300 text-stone-800 font-semibold py-3 px-4 rounded-xl transition">
                Cancel
              </button>
              <button type="submit" class="flex-1 bg-green-700 hover:bg-green-800 text-white font-semibold py-3 px-4 rounded-xl transition">
                Save Listing
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="./main.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Check authentication
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = './login.html';
    }

    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    mobileMenuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('hidden-menu');
    });

    // Logout functionality
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('mobile-logout-btn').addEventListener('click', logout);

    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userEmail');
      window.location.href = './login.html';
    }

    // Load listings from localStorage or use default data
    function getListings() {
      const stored = localStorage.getItem('plotnestListings');
      if (stored) {
        return JSON.parse(stored);
      }
      // Initialize with default data if not exists
      const defaultListings = [
        {
          id: 1,
          title: 'Prime ¼ Acre Plot in Karen',
          location: 'Karen',
          county: 'Nairobi',
          price: 12500000,
          type: 'Land',
          status: 'For Sale',
          size: '0.25 acres',
          bedrooms: null,
          bathrooms: null,
          image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80',
          description: 'A premium ¼ acre plot in the serene Karen neighborhood, ideal for a private family home.',
          features: ['Ready title deed', 'Water & electricity on site', 'Tarmac road access']
        },
        {
          id: 2,
          title: '3-Bedroom Villa in Runda',
          location: 'Runda',
          county: 'Kiambu',
          price: 35000000,
          type: 'Residential',
          status: 'For Sale',
          size: '0.5 acres',
          bedrooms: 3,
          bathrooms: 2,
          image: 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=800&q=80',
          description: 'Elegant 3-bedroom villa sitting on half an acre in the prestigious Runda estate.',
          features: ['All ensuite master bedroom', 'Modern fitted kitchen', 'Spacious garden']
        }
      ];
      localStorage.setItem('plotnestListings', JSON.stringify(defaultListings));
      return defaultListings;
    }

    function saveListings(listings) {
      localStorage.setItem('plotnestListings', JSON.stringify(listings));
    }

    function updateStats(listings) {
      document.getElementById('total-listings').textContent = listings.length;
      document.getElementById('active-listings').textContent = listings.filter(l => l.status === 'For Sale').length;
      document.getElementById('pending-listings').textContent = listings.filter(l => l.status === 'Pending').length;
      document.getElementById('sold-listings').textContent = listings.filter(l => l.status === 'Sold').length;
    }

    function renderListingsTable(listings) {
      const tbody = document.getElementById('listings-table-body');
      const noListings = document.getElementById('no-listings');

      if (listings.length === 0) {
        tbody.innerHTML = '';
        noListings.classList.remove('hidden');
        return;
      }

      noListings.classList.add('hidden');
      tbody.innerHTML = listings.map(listing => `
        <tr class="hover:bg-stone-50">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <img src="${listing.image || 'https://via.placeholder.com/60'}" alt="${listing.title}" class="w-12 h-12 rounded-lg object-cover">
              <div>
                <p class="font-medium text-stone-900">${listing.title}</p>
                <p class="text-sm text-stone-500">${listing.size || 'N/A'}</p>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 text-stone-600">${listing.location}</td>
          <td class="px-6 py-4 text-stone-600">${listing.type}</td>
          <td class="px-6 py-4 font-medium text-stone-900">KES ${listing.price.toLocaleString()}</td>
          <td class="px-6 py-4">
            <span class="inline-flex px-3 py-1 rounded-full text-sm font-medium ${
              listing.status === 'For Sale' ? 'bg-green-100 text-green-800' :
              listing.status === 'Pending' ? 'bg-orange-100 text-orange-800' :
              'bg-red-100 text-red-800'
            }">
              ${listing.status}
            </span>
          </td>
          <td class="px-6 py-4">
            <div class="flex gap-2">
              <button onclick="editListing(${listing.id})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition" title="Edit">
                <i data-lucide="edit-2" class="w-4 h-4"></i>
              </button>
              <button onclick="deleteListing(${listing.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="Delete">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
      lucide.createIcons();
    }

    // Modal handling
    const modal = document.getElementById('listing-modal');
    const modalTitle = document.getElementById('modal-title');
    const listingForm = document.getElementById('listing-form');

    document.getElementById('add-listing-btn').addEventListener('click', () => {
      modalTitle.textContent = 'Add New Listing';
      listingForm.reset();
      document.getElementById('listing-id').value = '';
      modal.classList.remove('hidden');
    });

    document.getElementById('add-first-listing-btn').addEventListener('click', () => {
      modalTitle.textContent = 'Add New Listing';
      listingForm.reset();
      document.getElementById('listing-id').value = '';
      modal.classList.remove('hidden');
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    document.getElementById('modal-backdrop').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    // Form submission
    listingForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const listings = getListings();
      const listingId = document.getElementById('listing-id').value;
      
      const listingData = {
        title: document.getElementById('title').value,
        location: document.getElementById('location').value,
        county: document.getElementById('county').value,
        price: parseInt(document.getElementById('price').value),
        type: document.getElementById('type').value,
        status: document.getElementById('status').value,
        size: document.getElementById('size').value,
        bedrooms: document.getElementById('bedrooms').value ? parseInt(document.getElementById('bedrooms').value) : null,
        bathrooms: document.getElementById('bathrooms').value ? parseInt(document.getElementById('bathrooms').value) : null,
        image: document.getElementById('image').value,
        description: document.getElementById('description').value,
        features: document.getElementById('features').value.split(',').map(f => f.trim()).filter(f => f)
      };

      if (listingId) {
        // Update existing listing
        const index = listings.findIndex(l => l.id === parseInt(listingId));
        if (index !== -1) {
          listings[index] = { ...listings[index], ...listingData };
        }
      } else {
        // Add new listing
        const newId = listings.length > 0 ? Math.max(...listings.map(l => l.id)) + 1 : 1;
        listings.push({ id: newId, ...listingData });
      }

      saveListings(listings);
      renderListingsTable(listings);
      updateStats(listings);
      modal.classList.add('hidden');
    });

    // Edit listing
    window.editListing = function(id) {
      const listings = getListings();
      const listing = listings.find(l => l.id === id);
      
      if (listing) {
        modalTitle.textContent = 'Edit Listing';
        document.getElementById('listing-id').value = listing.id;
        document.getElementById('title').value = listing.title;
        document.getElementById('location').value = listing.location;
        document.getElementById('county').value = listing.county;
        document.getElementById('price').value = listing.price;
        document.getElementById('type').value = listing.type;
        document.getElementById('status').value = listing.status;
        document.getElementById('size').value = listing.size || '';
        document.getElementById('bedrooms').value = listing.bedrooms || '';
        document.getElementById('bathrooms').value = listing.bathrooms || '';
        document.getElementById('image').value = listing.image || '';
        document.getElementById('description').value = listing.description;
        document.getElementById('features').value = listing.features ? listing.features.join(', ') : '';
        
        modal.classList.remove('hidden');
      }
    };

    // Delete listing
    window.deleteListing = function(id) {
      if (confirm('Are you sure you want to delete this listing?')) {
        const listings = getListings();
        const filtered = listings.filter(l => l.id !== id);
        saveListings(filtered);
        renderListingsTable(filtered);
        updateStats(filtered);
      }
    };

    // Initial load
    const listings = getListings();
    updateStats(listings);
    renderListingsTable(listings);
  </script>
</body>
</html>
